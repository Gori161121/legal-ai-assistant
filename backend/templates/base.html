<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Legal Intake Platform{% endblock %}</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --ink:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --ok:#16a34a; --warn:#f59e0b; --bad:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:16px 24px; border-bottom:1px solid #334155; display:flex; gap:16px; align-items:center; }
    header a { color:var(--muted); text-decoration:none; margin-right:14px; }
    header a:hover { color:var(--ink); }
    .brand { font-weight:700; color:var(--ink); font-size:18px; margin-right:auto; }
    main { padding:24px; max-width:1100px; margin:0 auto; }
    .grid { display:grid; gap:16px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
    .card { background:var(--card); border:1px solid #334155; border-radius:12px; padding:16px; }
    .metric { font-size:28px; font-weight:700; }
    .muted { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; }
    th, td { text-align:left; padding:10px 12px; border-bottom:1px solid #334155; font-size:14px; }
    th { color:var(--muted); font-weight:600; }
    .pill { padding:2px 8px; border-radius:999px; font-size:12px; }
    .hot { background:rgba(239,68,68,.18); color:#fca5a5; }
    .warm { background:rgba(245,158,11,.18); color:#fcd34d; }
    .cold { background:rgba(148,163,184,.18); color:#cbd5e1; }
    .step { padding:6px 10px; border-radius:8px; background:#334155; color:var(--muted); font-size:13px; }
    .step.active { background:var(--accent); color:white; }
    .disclaimer { color:var(--muted); font-size:12px; margin-top:24px; border-top:1px solid #334155; padding-top:12px; }
    h1 { font-size:22px; } h2 { font-size:16px; color:var(--muted); margin-top:28px; }
  </style>
</head>
<body>
  <header>
    <span class="brand">⚖️ Legal Intake Platform</span>
    <a href="/dashboard">Dashboard</a>
    <a href="/docs">API</a>
  </header>
  <main>
    {% block content %}{% endblock %}
    <p class="disclaimer">This platform handles intake and shares general information only. It does not provide legal advice.</p>
  </main>
</body>
</html>
